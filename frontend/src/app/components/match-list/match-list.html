<app-header></app-header>
<app-match-filter (filtersChanged)="onFiltersChanged($event)"> </app-match-filter>
<section class="matches-section">
  <div class="header">
    <span class="found">{{ totalElements()}} encontrados</span>
  </div>
  <section class="matches-grid">
    @for (match of matches(); track match.id) {
      <app-match [match]="match" (refresh)="loadMatches(true)"></app-match>
    }
  </section>

  @if (hasMore()) {
    <div class="load-more">

      <button
        mat-raised-button
        color="primary"
        (click)="loadMore()"
        [disabled]="loading()">

        @if (!loading()) {
          Cargar más
        } @else {
          <mat-spinner diameter="20"></mat-spinner>
        }

      </button>

    </div>
  }
</section>
