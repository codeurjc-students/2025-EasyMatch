<app-header></app-header>

<div class="matches-section">

  <div *ngIf="loading()" class="loading">
    <mat-icon class="spin">autorenew</mat-icon>
    Cargando partidos...
  </div>

  <div *ngIf="!loading() && matches().length === 0" class="empty">
    <mat-icon>event_busy</mat-icon>
    <p>No tienes partidos todavía.</p>
  </div>
  <mat-card *ngIf="!loading() && openMatches().length > 0" class="matches-card">
    <div *ngIf="openMatches().length > 0">

      <div class="header">
        <h2>Partidos abiertos</h2>
        <span class="found">{{ openMatches().length }} encontrados</span>
      </div>
      <mat-divider></mat-divider>
      <div class="matches-grid">
        <app-match
          *ngFor="let m of openMatches()"
          [match]="m">
        </app-match>
      </div>

    </div>
  </mat-card>
  <mat-card *ngIf="!loading() && closedMatches().length > 0" class="matches-card">
    <div *ngIf="closedMatches().length > 0">

      <div class="header">
        <h2>Partidos cerrados</h2>
        <span class="found">{{ closedMatches().length }} encontrados</span>
      </div>
      <mat-divider></mat-divider>
      <div class="matches-grid">
        <app-match
          *ngFor="let m of closedMatches()"
          [match]="m">
        </app-match>
      </div>

    </div>
  </mat-card>

</div>
